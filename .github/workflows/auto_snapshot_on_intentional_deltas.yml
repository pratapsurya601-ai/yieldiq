name: Auto-snapshot on merge (intentional FV deltas)

# Triggered when a PR is merged into main. If the merged PR body contained
# a non-empty `intentional-fv-deltas:` block, this workflow:
#
#   1. Re-runs `scripts/snapshot_50_stocks.py` against production
#   2. Commits the resulting snapshot back to main with `[skip ci]` so
#      we don't loop CI on a chore commit
#   3. Tags the commit message with the source PR number for traceability
#
# Why: when a PR intentionally moves fair-value for a ticker, the canary
# baseline must be refreshed or every subsequent PR sees a stale-baseline
# diff and the canary screams. Doing it manually is the kind of step
# everybody forgets at 6 PM.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write   # we push the snapshot commit back to main

jobs:
  auto-snapshot:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Detect intentional-fv-deltas in merged PR body
        id: detect
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Reuse the canary_diff parser so this stays in lockstep with
          # the gate. If the parser returns an empty set, skip everything.
          mkdir -p .ci-tmp
          printf '%s' "$PR_BODY" > .ci-tmp/pr_body.md
          python - <<'PY'
          import sys, json, pathlib
          sys.path.insert(0, "scripts")
          import canary_diff
          body = pathlib.Path(".ci-tmp/pr_body.md").read_text(encoding="utf-8", errors="replace")
          tickers = sorted(canary_diff._parse_intentional_deltas_text(body))
          out = pathlib.Path(".ci-tmp/intentional.json")
          out.write_text(json.dumps(tickers))
          print(f"intentional-fv-deltas: {tickers}")
          PY
          TICKERS=$(cat .ci-tmp/intentional.json)
          echo "tickers=${TICKERS}" >> "$GITHUB_OUTPUT"
          if [ "${TICKERS}" = "[]" ]; then
            echo "has_deltas=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_deltas=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run snapshot
        if: steps.detect.outputs.has_deltas == 'true'
        env:
          CANARY_API_BASE: https://api.yieldiq.in
          CANARY_AUTH_TOKEN: ${{ secrets.CANARY_AUTH_TOKEN }}
        run: python scripts/snapshot_50_stocks.py

      - name: Commit snapshot to main
        if: steps.detect.outputs.has_deltas == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TICKERS: ${{ steps.detect.outputs.tickers }}
        run: |
          git config user.name "yieldiq-ci-bot"
          git config user.email "ci-bot@yieldiq.in"
          # Stage anything the snapshot script wrote — it lives under
          # scripts/snapshots/ but we're permissive in case the script
          # also updates canary_stocks_50.json or similar.
          git add scripts/snapshots/ scripts/canary_stocks_50.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit (script may be a no-op)."
            exit 0
          fi
          git commit -m "chore: auto-snapshot post-merge of PR #${PR_NUMBER} (intentional FV deltas) [skip ci]

Tickers declared as intentional-fv-deltas in PR #${PR_NUMBER}: ${TICKERS}

Generated by .github/workflows/auto_snapshot_on_intentional_deltas.yml."
          git push origin main
