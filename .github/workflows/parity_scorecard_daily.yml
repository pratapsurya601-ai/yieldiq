name: Parity Scorecard — Daily

# Runs scripts/parity_scorecard.py against prod daily and commits the
# JSON snapshot to data/parity_history/YYYY-MM-DD.json so we can track
# progress over time.
#
# After all the Screener-parity phases land, this becomes a
# regression detector — if parity drops, we'll see it in the commit
# diff the next morning.

on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC = 10:30 IST, after ratio rebuild
  workflow_dispatch:

concurrency:
  group: parity-scorecard
  cancel-in-progress: false

jobs:
  measure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Run scorecard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p data/parity_history
          DATE=$(date -u +%Y-%m-%d)
          python scripts/parity_scorecard.py --save "data/parity_history/${DATE}.json"

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/parity_history/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no parity snapshot changes"
          else
            git commit -m "data: parity scorecard $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep 5
            done
          fi
