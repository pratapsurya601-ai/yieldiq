name: Fundamentals Backfill

# Runs batch_fetch_fundamentals against all NSE_UNIVERSE tickers.
# Populates the Aiven `financials` table with income / cashflow /
# balance-sheet rows per ticker, unlocking the fast local-DB analysis
# path (~200ms vs 10-25s yfinance fallback).
#
# Runs on GitHub Actions infrastructure — not Railway — so the job
# never saturates the web worker serving users. Tradeoff: adds
# ~90 min of GitHub Actions minutes per run.
#
# Triggers:
#   - Manual (workflow_dispatch) — primary use today
#   - Weekly cron (Sunday 00:30 UTC = 06:00 IST) — keeps data fresh
#     while users are asleep
#
# Needs a DATABASE_URL secret configured in the repo:
#   GitHub → repo → Settings → Secrets and variables → Actions
#   New repository secret:
#     Name:  DATABASE_URL
#     Value: postgres://avnadmin:PASSWORD@HOST:PORT/defaultdb?sslmode=require
#   (Same value as Railway's DATABASE_URL env var.)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max tickers to backfill (blank = all ~100)"
        required: false
        default: ""
      log_level:
        description: "Log level"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
  schedule:
    - cron: "30 0 * * 0"   # Sunday 00:30 UTC = 06:00 IST

jobs:
  backfill:
    runs-on: ubuntu-latest
    # Universe may be up to ~2,900 tickers (full NSE) after populate_stocks
    # has run. At ~2s/ticker batched that's ~100 min; 350 min gives headroom
    # for retries + yfinance hiccups.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify DATABASE_URL secret is present
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not configured."
            echo "Add it: GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          # Show only the host portion (no password leak)
          echo "DATABASE_URL configured (host ends with ...$(echo "$DATABASE_URL" | sed -n 's#.*@[^.]*\.\(.*\)#\1#p' | head -c 40))"

      - name: Run batch_fetch_fundamentals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
        run: |
          python - <<'PYEOF'
          import logging, os, sys, time

          logging.basicConfig(
              level=os.environ.get("LOG_LEVEL", "INFO"),
              format="%(asctime)s %(levelname)s %(name)s %(message)s",
          )
          log = logging.getLogger("backfill")

          # Make the repo importable
          sys.path.insert(0, ".")

          # Pull DATABASE_URL into the env var data_pipeline.db expects.
          # Different code paths check different names -- set both.
          _db_url = os.environ.get("DATABASE_URL") or os.environ.get("AIVEN_DSN")
          if not _db_url:
              log.error("DATABASE_URL not set")
              sys.exit(2)
          os.environ.setdefault("DATABASE_URL", _db_url)
          os.environ.setdefault("AIVEN_DSN", _db_url)

          from data_pipeline.db import Session
          from data_pipeline.pipeline import get_full_universe
          from data_pipeline.sources.yfinance_supplement import (
              batch_fetch_fundamentals,
          )

          universe = get_full_universe()
          limit_input = "${{ github.event.inputs.limit }}".strip()
          tickers = universe[:int(limit_input)] if limit_input else universe
          log.info(
              "Starting backfill for %d tickers "
              "(first 5: %s ... last 5: %s)",
              len(tickers), tickers[:5], tickers[-5:],
          )

          start = time.time()
          db = Session()
          try:
              ok, failed = batch_fetch_fundamentals(tickers, db)
          finally:
              db.close()
          duration = time.time() - start

          log.info(
              "Backfill done: ok=%d failed=%d total=%d duration=%.1fs",
              ok, failed, len(tickers), duration,
          )

          # Fail the job if <50% success — the full NSE universe includes
          # illiquid / delisted tickers that yfinance routinely 404s on,
          # so 80% was too strict once we scaled past 550. A <50% rate
          # still indicates something systemic (yfinance down, auth,
          # DB outage) and warrants a noisy failure.
          rate = ok / max(len(tickers), 1)
          if rate < 0.50:
              log.error("Success rate %.1f%% below 50%% threshold", rate * 100)
              sys.exit(1)
          PYEOF
