name: Nightly Fair-Value History Collection

# Hits /api/v1/analysis/{ticker}/og-data for every NSE_UNIVERSE ticker
# once a night. Each successful call runs the full DCF pipeline, which
# calls store_today_fair_value() and persists a row to the Aiven
# fair_value_history table.
#
# Purpose: accumulate ~365 daily observations per ticker so that in 12
# months we have a real out-of-sample backtest dataset -- "did our
# undervalued verdicts outperform the index?"
#
# Without this, fv_history only grows when users happen to analyze a
# stock, leaving most tickers with sparse or no data.
#
# Schedule: 17:00 UTC = 22:30 IST -- well after Indian market close
# (15:30 IST) so prices are settled. Each run takes ~10 min at 1 req/s
# across ~100 tickers.

on:
  schedule:
    - cron: "0 17 * * 1-5"   # weekdays only (no weekend market data)
  workflow_dispatch:          # manual trigger button
    inputs:
      limit:
        description: "Max tickers (blank = all)"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trigger analysis for each ticker
        id: collect
        run: |
          python - <<'PYEOF'
          import json, sys, time, urllib.request

          # Stdlib-only: pull the ticker list from our own public endpoint
          # (avoids importing data_pipeline which needs SQLAlchemy / yfinance
          # deps that aren't available in the bare runner).
          api = "https://api.yieldiq.in"

          def fetch_json(url, timeout=45):
              req = urllib.request.Request(url, headers={"User-Agent": "YIQFVCollector/1.0"})
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read().decode())

          try:
              raw = fetch_json(f"{api}/api/v1/public/all-tickers")
          except Exception as e:
              print(f"FATAL: could not fetch ticker list: {e}", file=sys.stderr)
              sys.exit(1)

          # Normalize: /all-tickers returns either [{ticker, full_ticker, ...}] or a dict
          if isinstance(raw, dict) and "tickers" in raw:
              raw = raw["tickers"]
          tickers = []
          for entry in raw:
              t = entry.get("full_ticker") if isinstance(entry, dict) else entry
              if t:
                  if not t.endswith(".NS") and not t.endswith(".BO"):
                      t = f"{t}.NS"
                  tickers.append(t)

          limit_input = "${{ github.event.inputs.limit }}"
          if limit_input:
              tickers = tickers[:int(limit_input)]

          ok, fail = 0, 0
          start = time.time()
          print(f"Collecting fair-value history for {len(tickers)} tickers...")
          for i, t in enumerate(tickers, 1):
              try:
                  data = fetch_json(f"{api}/api/v1/analysis/{t}/og-data")
                  if data.get("fair_value") is not None:
                      ok += 1
                  else:
                      fail += 1
              except Exception as e:
                  fail += 1
                  print(f"  ! {t}: {type(e).__name__}: {e}", file=sys.stderr)
              if i % 20 == 0 or i == len(tickers):
                  print(f"  [{i}/{len(tickers)}] ok={ok} fail={fail}")
              time.sleep(1.0)  # gentle on Railway

          total = max(len(tickers), 1)
          rate = ok / total
          print(f"\nDone in {time.time()-start:.0f}s. ok={ok} fail={fail} "
                f"(success={rate*100:.1f}%)")
          if rate < 0.80:
              print("FAIL: success rate below 80%", file=sys.stderr)
              sys.exit(1)
          PYEOF
