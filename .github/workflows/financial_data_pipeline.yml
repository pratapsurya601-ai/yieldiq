name: Weekly Financial Data Pipeline

on:
  schedule:
    # Saturday 2am IST  ==  Friday 20:30 UTC
    - cron: '30 20 * * 5'
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance psycopg2-binary python-dotenv requests

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd data_pipeline/xbrl
          python run.py full

      - name: Verify
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd data_pipeline/xbrl
          python verify.py
