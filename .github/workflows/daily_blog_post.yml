name: Daily blog post (top undervalued)

# Generates a SEBI-safe daily blog post from the top-5 stocks by
# margin of safety. Runs every day at 03:30 UTC (09:00 IST), commits
# the new post to frontend/src/lib/blog.ts, pushes back to main.
# Vercel rebuilds and serves /blog/top-undervalued-YYYY-MM-DD.
#
# Skips silently if today's post already exists in blog.ts.
#
# Required secrets:
#   - DATABASE_URL : Aiven Postgres
#   - GROQ_API_KEY : Llama 3.3 70B via Groq

on:
  schedule:
    - cron: "30 3 * * *"  # 03:30 UTC = 09:00 IST
  workflow_dispatch:
    inputs:
      top_n:
        description: "How many stocks to feature (1-10)"
        required: false
        default: "5"
      dry_run:
        description: "Print without writing"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary groq

      - name: Generate blog post
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          ARGS="--top-n ${{ github.event.inputs.top_n || '5' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/generate_daily_blog.py $ARGS

      - name: Commit + push
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet frontend/src/lib/blog.ts; then
            echo "no new post today (already exists or no qualifying stocks)"
            exit 0
          fi
          git add frontend/src/lib/blog.ts
          git commit -m "blog: daily top-undervalued post $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            sleep 5
          done
