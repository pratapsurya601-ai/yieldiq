name: Promoter Pledge Daily Ingest

# Indian governance signal #1. Pledge disclosures land on BSE / NSE
# during market hours; we run shortly after open so any new same-day
# filings are picked up while the data is freshest.
#
# 03:30 UTC = 09:00 IST  (post-open data freshness)
#
# Secrets required:
#   - DATABASE_URL : Aiven Postgres URL used by all YieldIQ data jobs.
#
# Note: BSE and NSE both rate-limit aggressively from non-Indian IPs.
# GitHub-hosted runners are typically US-based — if anti-bot becomes
# an issue, switch to a self-hosted runner egressing through an
# Indian residential proxy (or Railway egress IP if allowlisted).
# See `docs/promoter_pledge_implementation.md` § Anti-bot.

on:
  schedule:
    - cron: "30 3 * * 1-5"   # Mon-Fri 03:30 UTC = 09:00 IST
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers (default: backfill_list)"
        required: false
        default: ""
      limit:
        description: "Cap on ticker count for --apply (default 200)"
        required: false
        default: "200"

concurrency:
  group: promoter-pledge-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "requests>=2.31" \
            "beautifulsoup4>=4.12" \
            "psycopg2-binary>=2.9" \
            "SQLAlchemy>=2.0" \
            "python-dotenv>=1.0"

      - name: Check DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is missing."
            exit 1
          fi

      - name: Run pledge ingest (BSE then NSE bulk)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            python scripts/ingest_pledges.py \
              --apply \
              --tickers "${{ github.event.inputs.tickers }}" \
              --limit "${{ github.event.inputs.limit || '200' }}"
          else
            python scripts/ingest_pledges.py \
              --apply \
              --limit "${{ github.event.inputs.limit || '200' }}"
          fi

      - name: Coverage summary
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Surface ingest health: total pledge rows, fresh<24h,
          # tickers with non-zero pledge_pct.
          python - <<'PY'
          import os, psycopg2
          url = os.environ["DATABASE_URL"]
          if url.startswith("postgres://"):
              url = "postgresql://" + url[len("postgres://"):]
          c = psycopg2.connect(url); cur = c.cursor()
          cur.execute("SELECT COUNT(*) FROM promoter_pledges")
          total = cur.fetchone()[0]
          cur.execute(
              "SELECT COUNT(*) FROM promoter_pledges "
              "WHERE fetched_at > NOW() - INTERVAL '24 hours'"
          )
          fresh = cur.fetchone()[0]
          cur.execute(
              "SELECT COUNT(DISTINCT ticker) FROM promoter_pledges "
              "WHERE pledged_pct > 0"
          )
          nonzero = cur.fetchone()[0]
          print(f"promoter_pledges total={total:,} fresh<24h={fresh:,} "
                f"tickers_with_pledge={nonzero:,}")
          if fresh == 0:
              print("::warning::No fresh pledge rows in last 24h — "
                    "BSE/NSE may be blocking GH runner IPs.")
          PY
