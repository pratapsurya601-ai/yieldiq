name: Cache Warmup

# Pre-computes /api/v1/analysis/{ticker} for ~200 popular Indian
# stocks so users get an instant response on click.
#
# Runs twice a day:
#   - 03:30 UTC (09:00 IST) — 15 min before NSE open
#   - 11:00 UTC (16:30 IST) — just after NSE close
# Also runnable manually via workflow_dispatch.
#
# Requires the SERVICE_WARMUP_TOKEN secret. Generate it with:
#   railway run python scripts/generate_service_token.py
# then add under repo Settings → Secrets and variables → Actions.
#
# If the secret is missing, the workflow skips cleanly rather than
# failing — the app still works, we just don't warm the cache.

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 09:00 IST Mon–Fri
    - cron: "0 11 * * 1-5"   # 16:30 IST Mon–Fri
  workflow_dispatch:

concurrency:
  group: cache-warmup
  cancel-in-progress: false

jobs:
  warmup:
    runs-on: ubuntu-latest
    # First-ever run computes each ticker cold (~10s), so 200 tickers
    # ≈ 33 min. Subsequent runs are DB cache hits (<100ms each) so
    # finish in ~2 min. 60 min gives comfortable headroom for the
    # cold-start day and for yfinance hiccups.
    timeout-minutes: 60

    steps:
      - name: Check for SERVICE_WARMUP_TOKEN
        id: token_check
        env:
          TOKEN: ${{ secrets.SERVICE_WARMUP_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::SERVICE_WARMUP_TOKEN is not set — skipping warmup."
            echo "::warning::Run scripts/generate_service_token.py and add the token as a repo secret to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warm popular ticker caches
        if: steps.token_check.outputs.skip == 'false'
        env:
          TOKEN: ${{ secrets.SERVICE_WARMUP_TOKEN }}
          API_BASE: "https://api.yieldiq.in"
        run: |
          # Top ~200 NSE tickers by liquidity / user interest.
          # Covers Nifty 50 + Next 50 + Bank + key IT, Pharma, FMCG,
          # Auto, Metal, Energy, and thematic names.
          TICKERS=(
            RELIANCE.NS TCS.NS HDFCBANK.NS BHARTIARTL.NS ICICIBANK.NS
            INFY.NS SBIN.NS LT.NS HINDUNILVR.NS ITC.NS
            BAJFINANCE.NS HCLTECH.NS SUNPHARMA.NS MARUTI.NS
            KOTAKBANK.NS NTPC.NS AXISBANK.NS ULTRACEMCO.NS TITAN.NS
            ASIANPAINT.NS BAJAJFINSV.NS ADANIENT.NS ONGC.NS POWERGRID.NS
            TATAMOTORS.NS WIPRO.NS JSWSTEEL.NS COALINDIA.NS NESTLEIND.NS
            ADANIPORTS.NS TATASTEEL.NS GRASIM.NS BAJAJ-AUTO.NS TECHM.NS
            HINDALCO.NS CIPLA.NS TRENT.NS BEL.NS DRREDDY.NS
            SHRIRAMFIN.NS SBILIFE.NS HDFCLIFE.NS EICHERMOT.NS INDUSINDBK.NS
            HEROMOTOCO.NS BPCL.NS APOLLOHOSP.NS BRITANNIA.NS DIVISLAB.NS

            ADANIGREEN.NS ADANIPOWER.NS AMBUJACEM.NS BAJAJHLDNG.NS BANKBARODA.NS
            BOSCHLTD.NS CANBK.NS CHOLAFIN.NS COLPAL.NS DABUR.NS
            DLF.NS DMART.NS GAIL.NS GODREJCP.NS HAVELLS.NS
            ICICIGI.NS ICICIPRULI.NS IOC.NS IRFC.NS JINDALSTEL.NS
            LODHA.NS MARICO.NS MOTHERSON.NS NAUKRI.NS PFC.NS
            PIDILITIND.NS PNB.NS RECLTD.NS SBICARD.NS SIEMENS.NS
            TATAPOWER.NS TORNTPHARM.NS TVSMOTOR.NS UNITDSPR.NS VBL.NS
            VEDL.NS ZOMATO.NS ZYDUSLIFE.NS IRCTC.NS INDIGO.NS

            FEDERALBNK.NS IDFCFIRSTB.NS BANDHANBNK.NS AUBANK.NS RBLBANK.NS
            YESBANK.NS LICI.NS MUTHOOTFIN.NS MANAPPURAM.NS

            LTIM.NS MPHASIS.NS PERSISTENT.NS COFORGE.NS LTTS.NS
            TATAELXSI.NS KPITTECH.NS OFSS.NS

            LUPIN.NS AUROPHARMA.NS BIOCON.NS ALKEM.NS
            FORTIS.NS MAXHEALTH.NS LAURUSLABS.NS

            PGHH.NS UBL.NS TATACONSUM.NS JUBLFOOD.NS PAGEIND.NS
            RELAXO.NS BATAINDIA.NS

            ASHOKLEY.NS BALKRISIND.NS MRF.NS APOLLOTYRE.NS BHARATFORG.NS
            EXIDEIND.NS ENDURANCE.NS SUNDARMFIN.NS

            ABB.NS CUMMINSIND.NS BHEL.NS HAL.NS BDL.NS
            MAZDOCK.NS CONCOR.NS GMRINFRA.NS RVNL.NS

            HINDZINC.NS NMDC.NS SAIL.NS NATIONALUM.NS JSPL.NS

            PETRONET.NS GSPL.NS OIL.NS

            UPL.NS PIIND.NS GNFC.NS CHAMBLFERT.NS DEEPAKNTR.NS
            NAVINFLUOR.NS AARTIIND.NS ATUL.NS

            SHREECEM.NS ACC.NS DALBHARAT.NS RAMCOCEM.NS

            IDEA.NS TATACOMM.NS INDIAMART.NS PAYTM.NS
            POLICYBZR.NS MCX.NS BSE.NS CAMS.NS CDSL.NS

            GODREJPROP.NS OBEROIRLTY.NS PRESTIGE.NS BRIGADE.NS

            NYKAA.NS DELHIVERY.NS FIVESTAR.NS PNBHOUSING.NS
          )

          # Dedupe — safety net in case the same ticker is listed twice above.
          UNIQUE=$(printf "%s\n" "${TICKERS[@]}" | sort -u)

          # GH Actions enables `set -eo pipefail` by default. curl returns
          # non-zero on network errors / timeouts, and under errexit the
          # whole script would die mid-loop. The `|| echo "000"` turns
          # any curl failure into a soft "000" status we can count as
          # a fail but keep marching.
          OK=0
          FAIL=0
          TOTAL=0
          while IFS= read -r T; do
            [ -z "$T" ] && continue
            TOTAL=$((TOTAL + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 60 \
              -H "Authorization: Bearer $TOKEN" \
              "${API_BASE}/api/v1/analysis/${T}?include_summary=false" \
              || echo "000")
            if [ "$STATUS" = "200" ]; then
              OK=$((OK + 1))
            else
              echo "✗ $T → $STATUS"
              FAIL=$((FAIL + 1))
            fi
            # Throttle — 200 tickers × 0.5s ≈ 100s load, inside budget,
            # and keeps the single Railway worker from saturating.
            sleep 0.5
          done <<< "$UNIQUE"

          echo ""
          echo "Summary: $OK OK / $FAIL failed / $TOTAL total"

          # Tolerate some failures (delisted tickers, data_limited verdicts).
          # Only fail the workflow if more than half errored.
          if [ "$OK" -lt $((TOTAL / 2)) ]; then
            echo "::error::Majority of warmup requests failed — investigate API health"
            exit 1
          fi
