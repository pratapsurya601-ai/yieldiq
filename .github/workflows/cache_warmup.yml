name: Cache Warmup

# Keeps the /api/v1/analysis/{ticker} cache warm across all
# Railway worker processes for the top 30 tickers. Runs every
# 15 minutes — well inside the 30-minute cache TTL.
#
# Requires the SERVICE_WARMUP_TOKEN secret (generated by
# scripts/generate_service_token.py and added via
# Settings → Secrets and variables → Actions).

on:
  # DISABLED (18-Apr-2026): was failing ~every 15 min because
  # SERVICE_WARMUP_TOKEN was never configured (see scripts/generate_service_token.py).
  # With the 24h analysis cache TTL + nightly fv_history collection
  # (which warms caches as a side effect), 15-min warmup is redundant.
  # Re-enable if cache warming becomes necessary again (needs the secret first).
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Warm popular ticker caches
        env:
          TOKEN: ${{ secrets.SERVICE_WARMUP_TOKEN }}
          API_BASE: "https://api.yieldiq.in"
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::SERVICE_WARMUP_TOKEN secret is not set"
            exit 1
          fi

          TICKERS=(
            RELIANCE.NS TCS.NS HDFCBANK.NS INFY.NS ITC.NS
            SBIN.NS ICICIBANK.NS BAJFINANCE.NS MARUTI.NS TITAN.NS
            WIPRO.NS AXISBANK.NS KOTAKBANK.NS LT.NS SUNPHARMA.NS
            HCLTECH.NS NESTLEIND.NS ASIANPAINT.NS ULTRACEMCO.NS ADANIENT.NS
            ADANIPORTS.NS POWERGRID.NS NTPC.NS ONGC.NS COALINDIA.NS
            BHARTIARTL.NS DIVISLAB.NS DRREDDY.NS CIPLA.NS EICHERMOT.NS
          )

          OK=0
          FAIL=0
          for T in "${TICKERS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 20 \
              -H "Authorization: Bearer $TOKEN" \
              "${API_BASE}/api/v1/analysis/${T}")
            if [ "$STATUS" = "200" ]; then
              echo "✓ $T → $STATUS"
              OK=$((OK + 1))
            else
              echo "✗ $T → $STATUS"
              FAIL=$((FAIL + 1))
            fi
            sleep 2
          done

          echo ""
          echo "Summary: $OK OK, $FAIL failed, ${#TICKERS[@]} total"

          # Fail the workflow only if EVERY request failed — a few
          # 404s or 5xx are tolerable (yfinance has intermittent gaps).
          if [ "$OK" = "0" ]; then
            echo "::error::All warmup requests failed — check API health"
            exit 1
          fi
