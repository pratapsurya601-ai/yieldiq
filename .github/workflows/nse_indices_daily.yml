name: NSE Indices — Daily Ingest

# Pulls today's ind_close_all CSV from NSE archives and upserts the
# ~110 index rows (close + P/E + P/B + Div Yield) into
# nse_index_history.
#
# Why 19:00 IST: NSE publishes the EOD CSV ~17:30-18:00 IST. We give
# a 1-hour buffer for the file to land at archives.nseindia.com.
# Idempotent: ON CONFLICT (index_name, trade_date) DO UPDATE.
#
# Secrets required:
#   - DATABASE_URL : Neon Postgres connection string (read+write)

on:
  schedule:
    - cron: "30 13 * * 1-5"  # 13:30 UTC = 19:00 IST, Mon-Fri
  workflow_dispatch:
    inputs:
      from_date:
        description: "Backfill start (YYYY-MM-DD). Empty = today only."
        required: false
        default: ""
      to_date:
        description: "Backfill end (YYYY-MM-DD). Empty = today."
        required: false
        default: ""

concurrency:
  group: nse-indices-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary curl_cffi

      - name: Run NSE indices ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret missing"
            exit 1
          fi
          FROM="${{ github.event.inputs.from_date }}"
          TO="${{ github.event.inputs.to_date }}"
          TODAY=$(date -u +%Y-%m-%d)
          # Default to a 3-day window to catch any prior days the
          # scheduler missed (timezone, holiday-after-publish, etc.).
          if [ -z "$FROM" ]; then
            FROM=$(date -u -d "${TODAY} -3 days" +%Y-%m-%d)
          fi
          if [ -z "$TO" ]; then
            TO="$TODAY"
          fi
          echo "Ingesting NSE ind_close_all from $FROM to $TO"
          python scripts/data_pipelines/backfill_nse_indices_history.py \
              --from "$FROM" --to "$TO" --sleep 0.5
