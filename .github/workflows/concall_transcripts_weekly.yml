name: Concall Transcripts — Weekly

# Weekly pull of earnings-call / analyst-meet filings from NSE's
# corporate-announcements JSON endpoint into concall_transcripts.
#
# Only stores metadata (ticker, filing_date, quarter_end, pdf_url,
# subject, category). PDF download / text extraction is a separate
# pipeline (expensive; not in this job).
#
# Schedule: Sunday 04:00 UTC = 09:30 IST -- after the weekend lull,
# before Monday trading. Runtime budget ~90-120 min for top-500 with
# 1.5s per-request sleep + ~120 day window.

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      top:
        description: "Top-N tickers by market cap"
        required: false
        default: "500"
      days_back:
        description: "Look-back window in days"
        required: false
        default: "120"
      sleep:
        description: "Seconds between NSE requests"
        required: false
        default: "1.5"
      dry_run:
        description: "Fetch + log only; do not write"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: concall-transcripts-weekly
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install 'psycopg[binary]>=3.1' psycopg2-binary sqlalchemy \
                      curl_cffi pandas

      - name: Apply migration (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/apply_migration.py \
            data_pipeline/migrations/010_concall_transcripts.sql

      - name: Run backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS="--top ${{ github.event.inputs.top || '500' }}"
          ARGS="$ARGS --days-back ${{ github.event.inputs.days_back || '120' }}"
          ARGS="$ARGS --sleep ${{ github.event.inputs.sleep || '1.5' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "python scripts/backfill_concall_transcripts.py $ARGS"
          python scripts/backfill_concall_transcripts.py $ARGS

      - name: Coverage summary
        if: always() && github.event.inputs.dry_run != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install psycopg2-binary --quiet
          python - <<'PY'
          import os, psycopg2
          c = psycopg2.connect(os.environ["DATABASE_URL"]); cur = c.cursor()
          cur.execute("SELECT COUNT(*), COUNT(DISTINCT ticker) FROM concall_transcripts")
          total, tickers = cur.fetchone()
          cur.execute(
            "SELECT COUNT(*) FROM concall_transcripts "
            "WHERE filing_date >= CURRENT_DATE - INTERVAL '30 days'"
          )
          recent = cur.fetchone()[0]
          print(f"concall_transcripts rows       : {total:,}")
          print(f"distinct tickers               : {tickers:,}")
          print(f"filings in last 30 days        : {recent:,}")
          PY
