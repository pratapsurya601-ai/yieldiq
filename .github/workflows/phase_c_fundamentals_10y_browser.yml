name: Phase C (browser) — Fundamentals 10Y via Playwright

# BSE API flipped to 302→error_Bse.html for programmatic clients in
# April 2026. This workflow uses Playwright + playwright-stealth to
# drive a real Chromium, solve Akamai's JS challenge, and reuse the
# authenticated browser context to hit the same Peercomp JSON endpoints.
#
# ~3-4s per ticker in headless mode. 2,500 tickers across 4 shards:
# ~45 min.

on:
  workflow_dispatch:
    inputs:
      shards:
        description: "Parallel shards (1-8)"
        required: false
        default: "4"
      top:
        description: "Top-N by market cap (blank = all)"
        required: false
        default: ""
      skip_threshold:
        description: "Skip tickers with >= N annual periods"
        required: false
        default: "8"
      no_skip:
        description: "Re-fetch everything"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: phase-c-fundamentals-10y-browser
  cancel-in-progress: false

jobs:
  backfill:
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install 'psycopg[binary]>=3.1' psycopg2-binary sqlalchemy \
                       requests playwright playwright-stealth

      - name: Install Chromium for Playwright
        run: |
          python -m playwright install chromium --with-deps

      - name: Skip if shard >= shards
        id: guard
        run: |
          SHARDS="${{ github.event.inputs.shards || '4' }}"
          if [ "${{ matrix.shard }}" -ge "$SHARDS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shard ${{ matrix.shard }}
        if: steps.guard.outputs.skip == 'false'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS="--shard ${{ matrix.shard }} --shards ${{ github.event.inputs.shards || '4' }}"
          ARGS="$ARGS --skip-threshold ${{ github.event.inputs.skip_threshold || '8' }}"
          if [ -n "${{ github.event.inputs.top }}" ]; then
            ARGS="$ARGS --top ${{ github.event.inputs.top }}"
          fi
          if [ "${{ github.event.inputs.no_skip }}" = "true" ]; then
            ARGS="$ARGS --no-skip"
          fi
          python scripts/backfill_fundamentals_10y_browser.py $ARGS

  summary:
    needs: backfill
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install psycopg2-binary --quiet
          python - <<'PY'
          import os, psycopg2
          c = psycopg2.connect(os.environ["DATABASE_URL"]); cur = c.cursor()
          cur.execute("SELECT COUNT(*), COUNT(DISTINCT ticker) FROM financials")
          t, tk = cur.fetchone()
          cur.execute("SELECT COUNT(*) FROM (SELECT ticker FROM financials WHERE period_type='annual' AND revenue IS NOT NULL GROUP BY ticker HAVING COUNT(*) >= 8) x")
          d8 = cur.fetchone()[0]
          cur.execute("SELECT COUNT(*) FROM (SELECT ticker FROM financials WHERE period_type='annual' GROUP BY ticker HAVING COUNT(*) >= 10) x")
          d10 = cur.fetchone()[0]
          cur.execute("SELECT COUNT(*) FROM financials WHERE period_type='quarterly'")
          q = cur.fetchone()[0]
          print(f"financials rows:   {t:,}")
          print(f"distinct tickers:  {tk:,}")
          print(f"  >=8 annuals:     {d8:,}")
          print(f"  >=10 annuals:    {d10:,}")
          print(f"quarterly rows:    {q:,}")
          PY
