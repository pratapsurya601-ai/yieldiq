name: Ratio Staleness — PR Gate (warn-only)

# Non-blocking warning: when a PR touches data-shape surface
# (models/, backend/services/, scripts/build_ratio_history.py),
# count how many active tickers have stale ratio_history rows and
# surface the result as a step-summary annotation. Catches "we
# forgot to run weekly maintenance for 3 weeks".

on:
  pull_request:
    paths:
      - "models/**"
      - "backend/models/**"
      - "backend/services/**"
      - "scripts/build_ratio_history.py"
      - "scripts/rebuild_ratio_history.py"
      - "scripts/weekly_ratio_history_maintenance.py"
  workflow_dispatch:

jobs:
  staleness:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Run staleness check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set — skipping staleness check"
            python scripts/check_ratio_staleness.py --dry-db
            exit 0
          fi
          python scripts/check_ratio_staleness.py --threshold 100 --stale-days 90
