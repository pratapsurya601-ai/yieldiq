name: Archive windowed tables (weekly)

# Moves aged rows out of growth-unbounded PG tables into Parquet
# archives, so Aiven Hobby 1GB cap never gets hit.
#
# Kept windows:
#   fair_value_history    last 90 days in PG
#   market_metrics        last 2Y in PG
#   shareholding_pattern  last 3Y in PG (rest in Parquet)
#
# The archive Parquet files are committed back to the repo so the
# read-layer (backend/services/price_history_service.py and future
# sibling services) can union PG + Parquet via DuckDB.
#
# Schedule: Sunday 03:30 UTC = 09:00 IST. Weekly frequency is plenty
# since growth rates are modest.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report counts only, don't move anything"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "30 3 * * 0"  # Sunday 03:30 UTC

concurrency:
  group: archive-windowed
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow psycopg2-binary

      - name: Run archive script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python scripts/archive_windowed_tables.py $ARGS

      - name: Commit parquet snapshots
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "data/parquet/archive/" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no archive snapshots to commit this week"
          else
            git commit -m "data: weekly archive snapshot $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep 5
            done
          fi

      - name: Coverage report
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os, psycopg2
          c = psycopg2.connect(os.environ["DATABASE_URL"]); cur = c.cursor()
          cur.execute("SELECT pg_size_pretty(pg_database_size(current_database()))")
          print(f"DB size after archive: {cur.fetchone()[0]}")
          for tbl in ("fair_value_history", "market_metrics", "shareholding_pattern"):
            cur.execute(f"SELECT COUNT(*) FROM {tbl}")
            print(f"  {tbl}: {cur.fetchone()[0]:,} rows remain in PG")
          PY
