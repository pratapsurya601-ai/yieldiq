name: Weekly Newsletter

on:
  schedule:
    - cron: "30 2 * * 0"  # Sunday 2:30 UTC = 8:00 AM IST
  workflow_dispatch:       # Manual trigger

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger newsletter via API
        env:
          TOKEN: ${{ secrets.SERVICE_WARMUP_TOKEN }}
          API_BASE: ${{ secrets.API_BASE_URL }}
        run: |
          API="${API_BASE:-https://yieldiq-production.up.railway.app}"
          echo "Triggering newsletter at $API"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 300 \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "${API}/api/v1/admin/trigger-newsletter")
          echo "Newsletter trigger status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Newsletter trigger returned $STATUS"
          fi
