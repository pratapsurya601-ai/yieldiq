name: Hex History — Weekly Backfill

# Refreshes the hex_history table (12 quarters × top-N tickers) so the
# Prism Time Machine scrubber always has fresh snapshots.
#
# Runs Sunday 18:00 UTC (Monday 23:30 IST — well after market close) and
# on manual dispatch. The backfill is idempotent (ON CONFLICT UPDATE) so
# re-runs are safe.
#
# CRITICAL: this workflow does NOT hit the live Railway API. It connects
# directly to Aiven/Neon Postgres so the Railway worker isn't blocked by
# 500 × 12 ≈ 6k snapshot computations.
#
# Secrets required (one of):
#   - NEON_DATABASE_URL : preferred (post-2026-04 migration)
#   - DATABASE_URL      : legacy fallback (Aiven Postgres)
# If BOTH are missing we now fail loud — the previous "skip cleanly"
# behaviour silently ate weeks of empty backfills.

on:
  schedule:
    # Sunday 18:00 UTC = Monday 23:30 IST
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "How many top tickers to backfill (default 500)"
        required: false
        default: "500"
      quarters:
        description: "Quarters per ticker (default 12)"
        required: false
        default: "12"
      seed_from_cache:
        description: "Seed missing rows from analysis_cache before backfill"
        required: false
        type: boolean
        default: false

concurrency:
  group: hex-history-weekly
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    # Was 60. Bumped to 180 after the 2026-04-22 cancellation: a full
    # 500 × 12 backfill against Neon's cold-start cluster came in around
    # 70 min and we want headroom for retries / contention spikes.
    timeout-minutes: 180

    steps:
      - name: Resolve database URL (Neon preferred, Aiven fallback)
        id: dburl
        env:
          NEON_DB: ${{ secrets.NEON_DATABASE_URL }}
          AIVEN_DB: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$NEON_DB" ]; then
            echo "Using NEON_DATABASE_URL"
            echo "source=neon" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$NEON_DB"
            echo "DATABASE_URL=$NEON_DB" >> "$GITHUB_ENV"
          elif [ -n "$AIVEN_DB" ]; then
            echo "::warning::NEON_DATABASE_URL missing — falling back to legacy DATABASE_URL"
            echo "source=aiven" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$AIVEN_DB"
            echo "DATABASE_URL=$AIVEN_DB" >> "$GITHUB_ENV"
          else
            echo "::error::Neither NEON_DATABASE_URL nor DATABASE_URL is set — failing loudly (was previously a silent skip)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps (cache-only mode skips heavy chain)
        run: |
          python -m pip install --upgrade pip
          # The seeder runs in --cache-only mode (see Run backfill step
          # below). That code path goes through ONLY the pure
          # backend.services.analysis.hex_axes module — it does NOT
          # import hex_history_service, hex_service, analysis/service,
          # or data/collector. So we don't need requests, yfinance, or
          # any of the chain that those modules pull in.
          #
          # pydantic is still listed because the response models in the
          # analysis stack use it, and Python evaluates imports eagerly
          # — defense-in-depth against future code paths that might
          # accidentally re-introduce a soft dependency.
          pip install "sqlalchemy>=2.0" "psycopg[binary]>=3.1" psycopg2-binary python-dateutil \
                      "pydantic>=2.0" numpy pandas

      - name: Pre-flight row counts
        # Instant visibility into the chosen DB. If these numbers don't
        # match what we expect, abort before the 70-min backfill burns CI
        # minutes against the wrong cluster.
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text
          url = os.environ["DATABASE_URL"]
          if url.startswith("postgres://"):
              url = url.replace("postgres://", "postgresql+psycopg://", 1)
          elif url.startswith("postgresql://"):
              url = url.replace("postgresql://", "postgresql+psycopg://", 1)
          eng = create_engine(url)
          tables = ["market_metrics", "company_financials", "analysis_cache", "fair_value_history"]
          with eng.connect() as cx:
              for t in tables:
                  try:
                      n = cx.execute(text(f"SELECT count(*) FROM {t}")).scalar()
                      print(f"  {t:>24s}: {n:>10,} rows")
                  except Exception as e:
                      print(f"  {t:>24s}: ERROR {e}")
          PY

      - name: Ensure hex_history table exists
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text
          url = os.environ["DATABASE_URL"]
          # SQLAlchemy 2 psycopg v3 driver name
          if url.startswith("postgres://"):
              url = url.replace("postgres://", "postgresql+psycopg://", 1)
          elif url.startswith("postgresql://"):
              url = url.replace("postgresql://", "postgresql+psycopg://", 1)
          eng = create_engine(url)
          with open("backend/migrations/create_hex_history.sql") as f:
              ddl = f.read()
          with eng.begin() as cx:
              for stmt in [s for s in ddl.split(";") if s.strip()]:
                  cx.execute(text(stmt))
          print("hex_history table ensured")
          PY

      - name: Run backfill (--cache-only, slim path)
        env:
          LIMIT: ${{ github.event.inputs.limit || '500' }}
          QUARTERS: ${{ github.event.inputs.quarters || '1' }}
        run: |
          # --cache-only is non-negotiable for this workflow. It uses
          # ONLY the pure backend.services.analysis.hex_axes path, so
          # the runner doesn't need streamlit/requests/yfinance/etc.
          # --quarters is forced to 1 because cache-only synthesises
          # only the current quarter from analysis_cache (no historical
          # reconstruction is possible without the heavy import chain).
          python backend/scripts/backfill_hex_history.py \
            --limit "$LIMIT" --quarters 1 --cache-only

      - name: Post-flight hex_history row count (loud-fail if empty)
        run: |
          python - <<'PY'
          import os, sys
          from sqlalchemy import create_engine, text
          url = os.environ["DATABASE_URL"]
          if url.startswith("postgres://"):
              url = url.replace("postgres://", "postgresql+psycopg://", 1)
          elif url.startswith("postgresql://"):
              url = url.replace("postgresql://", "postgresql+psycopg://", 1)
          eng = create_engine(url)
          with eng.connect() as cx:
              n = cx.execute(text("SELECT count(*) FROM hex_history")).scalar() or 0
          print(f"hex_history: {n:,} rows after backfill")
          if n == 0:
              print("::error::hex_history is still empty after backfill — failing the job.")
              sys.exit(1)
          PY
