name: Data Quality Canary
# Threshold ratchet: 4 (now) -> 12 -> 15 -> 18 (target, 2/20 tolerated).
# Bump CANARY_THRESHOLD below as fixes land. Do NOT auto-ratchet.
env:
  CANARY_THRESHOLD: "4"
  API_BASE: "https://api.yieldiq.in"

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/services/analysis_service.py"
      - "backend/services/local_data_service.py"
      - "backend/services/validators.py"
      - "screener/**/*.py"
      - "models/**/*.py"
      - "dashboard/utils/scoring.py"
      - "data_pipeline/nse_prices/**/*.py"
      - "data_pipeline/**"
      - "scripts/canary_check.py"
  pull_request:
    branches: [main]
    paths:
      - "backend/services/analysis_service.py"
      - "backend/services/local_data_service.py"
      - "backend/services/validators.py"
      - "screener/**/*.py"
      - "models/**/*.py"
      - "dashboard/utils/scoring.py"
      - "data_pipeline/nse_prices/**/*.py"
      - "scripts/canary_check.py"

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: false
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run canary check
        run: |
          python scripts/canary_check.py --api-base "${API_BASE}" \
            --threshold "${CANARY_THRESHOLD}" --report canary_report.json

      - name: Upload canary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-report
          path: canary_report.json
          retention-days: 30

      - name: Notify Slack (scheduled failures only)
        if: failure() && github.event_name == 'schedule' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          P=$(python -c "import json;print(json.load(open('canary_report.json'))['passed'])" 2>/dev/null || echo "?")
          T=$(python -c "import json;print(json.load(open('canary_report.json'))['total'])" 2>/dev/null || echo "20")
          URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rotating_light: Canary FAIL: ${P}/${T} stocks broken. ${URL}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify by email (scheduled failures only)
        # Fires only on scheduled runs AND only when BOTH ALERT_EMAIL and
        # ALERT_APP_PW are set. Coexists with Slack — both fire if configured.
        if: failure() && github.event_name == 'schedule' && env.ALERT_EMAIL != '' && env.ALERT_APP_PW != ''
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_APP_PW: ${{ secrets.ALERT_APP_PW }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL }}
          password: ${{ secrets.ALERT_APP_PW }}
          subject: "YieldIQ canary FAIL"
          to: ${{ secrets.ALERT_EMAIL }}
          from: "YieldIQ Canary <${{ secrets.ALERT_EMAIL }}>"
          body: |
            Canary violations detected on ${{ env.API_BASE }}.

            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The canary report JSON is attached.
          attachments: canary_report.json

      - name: Open GitHub issue (scheduled fail, no Slack)
        if: failure() && github.event_name == 'schedule' && env.SLACK_WEBHOOK_URL == ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let r = { passed: '?', total: 20, failures: [] };
            try { r = JSON.parse(fs.readFileSync('canary_report.json', 'utf8')); } catch(e) {}
            const title = `Canary FAIL: ${r.passed}/${r.total} stocks broken`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            if (existing.data.some(i => i.title === title)) { core.info('dedupe: issue exists'); return; }
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const lines = (r.failures||[]).map(f => `- **${f.ticker}**: ${(f.issues||[]).join('; ')}`).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title,
              body: `Scheduled canary failed.\n\nRun: ${runUrl}\n\n### Failures\n${lines || '(none)'}\n`,
              labels: ['canary','bug'] });

      - name: Annotate failure
        if: failure()
        run: |
          echo "::error::Canary failed — data quality regression on production!"
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
