name: Run DB Migration (one-off)

on:
  workflow_dispatch:
    inputs:
      migration:
        description: "Migration to run"
        required: true
        type: choice
        options:
          - create_fair_value_history
          - create_yfinance_info_cache
        default: create_yfinance_info_cache

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install sqlalchemy psycopg2-binary

      - name: Run migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          MIGRATION: ${{ inputs.migration }}
        run: python scripts/migrate.py

      - name: Verify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: python scripts/verify_migration.py
