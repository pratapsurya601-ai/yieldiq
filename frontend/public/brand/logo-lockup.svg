<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="YieldIQ">
  <!--
    Horizontal lockup: mark + wordmark. Use this in the site header,
    newsletter header, and email signatures. Transparent background.
  -->
  <defs>
    <radialGradient id="bodyGradLk" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2E2A7A"/>
      <stop offset="55%" stop-color="#151242"/>
      <stop offset="100%" stop-color="#030214"/>
    </radialGradient>
    <linearGradient id="rimGradLk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="magGradLk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="iqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Mark on the left (centered vertically, scaled to fit 320 height) -->
  <g transform="translate(20, 32) scale(0.5)">
    <circle cx="256" cy="256" r="220" fill="url(#bodyGradLk)"/>
    <circle cx="256" cy="256" r="220" fill="none" stroke="url(#rimGradLk)" stroke-width="4"/>
    <path d="M 168 168 L 256 300" stroke="#F8FAFC" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M 256 300 L 256 404" stroke="#F8FAFC" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M 256 300 L 316 240" stroke="url(#magGradLk)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <circle cx="348" cy="208" r="50" fill="none" stroke="url(#magGradLk)" stroke-width="14"/>
    <rect x="320" y="220" width="6" height="14" rx="1" fill="#22D3EE"/>
    <rect x="332" y="214" width="6" height="20" rx="1" fill="#22D3EE"/>
    <rect x="344" y="208" width="6" height="26" rx="1" fill="#22D3EE"/>
    <rect x="356" y="200" width="6" height="34" rx="1" fill="#22D3EE"/>
    <path d="M 322 202 L 340 192 L 356 186 L 370 180" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" fill="none"/>
    <polygon points="370,180 362,180 368,174" fill="#F59E0B"/>
  </g>

  <!-- Wordmark: "Yield" in white/navy, "IQ" in cyan-magenta gradient -->
  <!-- For light backgrounds the viewer can override Yield color via CSS/class -->
  <text x="310" y="200"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="160"
        font-weight="700"
        fill="#0F172A"
        letter-spacing="-4">Yield<tspan fill="url(#iqGrad)">IQ</tspan></text>

  <!-- Underline rule (echoes the existing logo.jpeg design detail) -->
  <line x1="310" y1="228" x2="860" y2="228" stroke="url(#iqGrad)" stroke-width="5" stroke-linecap="round"/>
</svg>
