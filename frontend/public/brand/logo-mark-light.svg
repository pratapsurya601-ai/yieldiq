<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="YieldIQ">
  <!--
    Light-mode variant. Inverts body/rim so the mark works on white
    backgrounds (Gmail light mode, light tab favicons, print).
  -->
  <defs>
    <radialGradient id="bodyGradL" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </radialGradient>
    <linearGradient id="rimGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="magGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="220" fill="url(#bodyGradL)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#rimGradL)" stroke-width="4"/>

  <!-- Y in dark navy for contrast on white body -->
  <path d="M 168 168 L 256 300" stroke="#0F172A" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M 256 300 L 256 404" stroke="#0F172A" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M 256 300 L 316 240" stroke="url(#magGradL)" stroke-width="20" stroke-linecap="round" fill="none"/>

  <circle cx="348" cy="208" r="50" fill="none" stroke="url(#magGradL)" stroke-width="14"/>
  <rect x="320" y="220" width="6" height="14" rx="1" fill="#0891B2"/>
  <rect x="332" y="214" width="6" height="20" rx="1" fill="#0891B2"/>
  <rect x="344" y="208" width="6" height="26" rx="1" fill="#0891B2"/>
  <rect x="356" y="200" width="6" height="34" rx="1" fill="#0891B2"/>
  <path d="M 322 202 L 340 192 L 356 186 L 370 180" stroke="#D97706" stroke-width="3" stroke-linecap="round" fill="none"/>
  <polygon points="370,180 362,180 368,174" fill="#D97706"/>
</svg>
